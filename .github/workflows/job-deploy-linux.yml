      - name: Run Data Upload Scripts
        shell: bash
        run: |
          echo "📊 Running data upload scripts to populate product catalogs and create search indexes..."
          
          # Navigate to workspace root
          cd $GITHUB_WORKSPACE
          
          MAX_RETRIES=3
          RETRY_DELAY=30
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Attempt $attempt of $MAX_RETRIES..."
            bash ./infra/scripts/data_scripts/run_upload_data_scripts.sh && break
            if [[ $attempt -eq $MAX_RETRIES ]]; then
              echo "❌ Data upload failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "✅ Data upload completed successfully"
      - name: Run Agent Creation Scripts
        shell: bash
        run: |
          echo "🤖 Running agent creation scripts to set up Azure AI Foundry agents..."
          
          # Navigate to workspace root
          cd $GITHUB_WORKSPACE
          
          MAX_RETRIES=3
          RETRY_DELAY=30
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Attempt $attempt of $MAX_RETRIES..."
            bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh && break
            if [[ $attempt -eq $MAX_RETRIES ]]; then
              echo "❌ Agent creation failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "✅ Agent creation completed successfully"

      - name: Wait for Data Propagation
        shell: bash
        run: |
          echo "⏳ Waiting 5 minutes for data to propagate and indexes to update..."
          sleep 300
          echo "✅ Wait completed, data should now be available"

      - name: Wait for App Readiness (E2E Tests)
