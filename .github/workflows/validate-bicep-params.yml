name: Validate Bicep Parameters

permissions:
  contents: read

on:
  schedule:
    - cron: '30 6 * * 3' # Wednesday 12:00 PM IST (6:30 AM UTC)
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'infra/**/*.bicep'
      - 'infra/**/*.parameters.json'
      - 'infra_basic/**/*.bicep'
      - 'infra_basic/**/*.parameters.json'
  workflow_dispatch:

env:
  accelerator_name: "Customer Chatbot"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate infra/ parameters
        id: validate_infra
        continue-on-error: true
        env:
          ACCELERATOR_NAME: ${{ env.accelerator_name }}
        run: |
          set +e
          python infra/scripts/validate_bicep_params.py --dir infra --strict --no-color \
            --json-output infra_results.json 2>&1 | tee infra_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "## Infra Param Validation" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat infra_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

      - name: Validate infra_basic/ parameters
        id: validate_infra_basic
        continue-on-error: true
        env:
          ACCELERATOR_NAME: ${{ env.accelerator_name }}
        run: |
          set +e
          python infra/scripts/validate_bicep_params.py --dir infra_basic --strict --no-color \
            --json-output infra_basic_results.json 2>&1 | tee infra_basic_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "## Infra Basic Param Validation" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat infra_basic_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

      - name: Set overall result
        id: result
        run: |
          if [[ "${{ steps.validate_infra.outcome }}" == "failure" || "${{ steps.validate_infra_basic.outcome }}" == "failure" ]]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate combined HTML email report
        if: always()
        env:
          ACCELERATOR_NAME: ${{ env.accelerator_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          python infra/scripts/validate_bicep_params.py \
            --dir infra --dir infra_basic --no-color \
            --html-output email_body.html \
            --accelerator-name "${ACCELERATOR_NAME}" \
            --run-url "${RUN_URL}" || true

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bicep-validation-results
          path: |
            infra_results.json
            infra_basic_results.json
            email_body.html
          retention-days: 30

      - name: Send schedule notification on failure
        if: github.event_name == 'schedule' && steps.result.outputs.status == 'failure'
        env:
          LOGICAPP_URL: ${{ secrets.EMAILNOTIFICATION_LOGICAPP_URL_TA }}
          ACCELERATOR_NAME: ${{ env.accelerator_name }}
        run: |
          EMAIL_BODY=$(cat email_body.html)

          jq -n \
            --arg name "${ACCELERATOR_NAME}" \
            --arg body "$EMAIL_BODY" \
            '{subject: ("Bicep Parameter Validation Report - " + $name + " - Issues Detected"), body: $body}' \
            | curl -X POST "${LOGICAPP_URL}" \
              -H "Content-Type: application/json" \
              -d @- || echo "Failed to send notification"

      - name: Send schedule notification on success
        if: github.event_name == 'schedule' && steps.result.outputs.status == 'success'
        env:
          LOGICAPP_URL: ${{ secrets.EMAILNOTIFICATION_LOGICAPP_URL_TA }}
          ACCELERATOR_NAME: ${{ env.accelerator_name }}
        run: |
          EMAIL_BODY=$(cat email_body.html)

          jq -n \
            --arg name "${ACCELERATOR_NAME}" \
            --arg body "$EMAIL_BODY" \
            '{subject: ("Bicep Parameter Validation Report - " + $name + " - Passed"), body: $body}' \
            | curl -X POST "${LOGICAPP_URL}" \
              -H "Content-Type: application/json" \
              -d @- || echo "Failed to send notification"

      - name: Fail if errors found
        if: steps.result.outputs.status == 'failure'
        run: exit 1
