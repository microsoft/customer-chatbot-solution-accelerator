name: Test Workflow with Coverage

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/**/*.py'
      - '.flake8'
      - '.github/workflows/tests.yaml'
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
    paths:
      - 'src/**/*.py'
      - '.github/workflows/tests.yaml'

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      - uses: actions/checkout@v6  # Checkout the repository

      # Set up Python environment for Backend
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"  # Set Python version

      - name: Install Backend Dependencies
        run: |
          python -m pip install -r src/api/requirements.txt

      - name: Run Backend Tests with Coverage
        working-directory: src
        run: |
          if python -m pytest --cov=api/app --cov-config=tests/.coveragerc --cov-report=xml --cov-report=html --cov-report=term-missing --junitxml=coverage-junit.xml ./tests; then
            echo "Tests completed, checking coverage."
            # Only fail if coverage does not meet criteria
            if [ -f coverage.xml ]; then
              COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); coverage = float(root.attrib['line-rate']) * 100; print(coverage)")
              if (( $(echo "$COVERAGE < 80" | bc -l) )); then
                echo "Coverage is below 80% ($COVERAGE%), failing the job."
                exit 1
              else
                echo "Coverage is $COVERAGE%, meeting the threshold."
              fi
            fi
          else
            echo "No tests found, skipping coverage check."
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            src/coverage.xml
            src/coverage-junit.xml
            src/htmlcov/

      - name: Pytest Coverage Comment
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        uses: MishaKav/pytest-coverage-comment@dd5b80bde6d16941f336518e92929e89069d8451  # v1.7.2
        with:
          pytest-xml-coverage-path: src/coverage.xml
          junitxml-path: src/coverage-junit.xml
          report-only-changed-files: true